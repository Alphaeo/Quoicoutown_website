<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quoicoutown — Saison 3 Forever</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
</head>
<body>

  <div id="pixelBg"></div>

  <!-- ── NAVBAR ─────────────────────────────────── -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo-brand">
      <img src="logo.svg" alt="QT" class="nav-logo-img">
      <span class="nav-brand">QT</span>
    </a>
    <div class="nav-links">
      <a href="index.html"     class="nav-link active">Accueil</a>
      <a href="consignes.html" class="nav-link">Rejoindre</a>
      <a href="equipe.html"    class="nav-link">Notre Équipe</a>
    </div>
  </nav>

  <!-- ── HERO ───────────────────────────────────── -->
  <section class="hero">
    <div class="hero-logo-wrap" style="margin-bottom:2rem;">
      <img src="logo.svg" alt="Quoicoutown Logo" class="hero-logo" style="width:160px;height:160px;display:block;margin:0 auto;">
    </div>

    <p class="hero-eyebrow">✦ SERVEUR MINECRAFT ✦</p>

    <div class="hero-title">
      <span class="title-main">Quoicoutown</span>
      <span class="title-season">Saison 3</span>
      <span class="title-forever"><em>Forever</em></span>
    </div>

    <div class="hero-cta">
      <a href="consignes.html" class="mc-btn mc-btn-green">► Rejoindre</a>
      <a href="#screenshots"   class="mc-btn mc-btn-pink">◎ Les builds</a>
    </div>
  </section>

  <div class="grad-rule"></div>

  <!-- ── SCREENSHOTS ────────────────────────────── -->
  <section class="screenshots-section" id="screenshots">
    <div class="section-title green">— CE QU'ON A CONSTRUIT —</div>

    <div class="screenshots-grid">

      <!-- Featured -->
      <div class="screenshot-item screenshot-featured">
        <img src="screens/2026-05-15_13.46.45.png" alt="Build Quoicoutown" loading="lazy">
      </div>

      <div class="screenshot-item">
        <img src="screens/2026-05-14_03.11.43.png" alt="Build Quoicoutown" loading="lazy">
      </div>

      <div class="screenshot-item">
        <img src="screens/2026-05-15_03.39.13.png" alt="Build Quoicoutown" loading="lazy">
      </div>

      <div class="screenshot-item">
        <img src="screens/2026-05-15_03.39.24.png" alt="Build Quoicoutown" loading="lazy">
      </div>

      <div class="screenshot-item">
        <img src="screens/2026-05-19_18.11.24.png" alt="Build Quoicoutown" loading="lazy">
      </div>

    </div>
  </section>

  <div class="grad-rule"></div>

  <!-- ── FOOTER ─────────────────────────────────── -->
  <footer>
    <p>QUOICOUTOWN &nbsp;·&nbsp; Saison 3 <em>Forever</em> &nbsp;·&nbsp; 2025–2026</p>
  </footer>

  <!-- ── JS : particules ────────────────────────── -->
  <script>
    const bg = document.getElementById('pixelBg');
    const colors = ['#5AA612','#4FC3F7','#FF6B9D','#7DD632','#1565C0'];
    for (let i = 0; i < 30; i++) {
      const el = document.createElement('div');
      el.className = 'px-particle';
      el.style.cssText = [
        `left:${Math.random()*100}%`,
        `width:${4+Math.random()*8}px`,
        `height:${4+Math.random()*8}px`,
        `background:${colors[Math.floor(Math.random()*colors.length)]}`,
        `animation-duration:${10+Math.random()*20}s`,
        `animation-delay:${-Math.random()*20}s`,
      ].join(';');
      bg.appendChild(el);
    }
  </script>

</body>
</html>
