<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merch — Quoicoutown S3 Forever</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
</head>
<body>

  <div id="pixelBg"></div>

  <!-- ── NAVBAR ─────────────────────────────────── -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo-brand">
      <img src="logo.svg" alt="QT" class="nav-logo-img">
      <span class="nav-brand">QT</span>
    </a>
    <div class="nav-links">
      <a href="index.html"     class="nav-link">Accueil</a>
      <a href="consignes.html" class="nav-link">Rejoindre</a>
      <a href="equipe.html"    class="nav-link">Notre Équipe</a>
      <a href="merch.html"     class="nav-link active">Merch</a>
    </div>
  </nav>

  <!-- ── HERO ───────────────────────────────────── -->
  <div class="page-hero">
    <h1 style="color:var(--pink);text-shadow:3px 3px 0 var(--pink-dark),0 0 30px rgba(255,107,157,.5);">MERCH</h1>
    <p>Porte les couleurs de Quoicoutown.</p>
  </div>

  <div class="grad-rule"></div>

  <!-- ── VÊTEMENTS ──────────────────────────────── -->
  <section class="merch-section">
    <div class="section-title pink">— QUOICOUTOWN COLLECTION —</div>

    <div class="merch-grid">

      <!-- Hoodie -->
      <div class="merch-card">
        <div class="merch-preview">
          <svg viewBox="0 0 120 100" width="110" class="merch-svg" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
            <!-- Hood -->
            <rect x="40" y="0"  width="40" height="8"  fill="#3a1a40"/>
            <rect x="36" y="8"  width="48" height="8"  fill="#3a1a40"/>
            <!-- Shoulders -->
            <rect x="0"  y="8"  width="36" height="8"  fill="#FF6B9D" opacity=".7"/>
            <rect x="84" y="8"  width="36" height="8"  fill="#FF6B9D" opacity=".7"/>
            <!-- Sleeves -->
            <rect x="0"  y="16" width="28" height="40" fill="#FF6B9D" opacity=".6"/>
            <rect x="92" y="16" width="28" height="40" fill="#FF6B9D" opacity=".6"/>
            <!-- Body -->
            <rect x="28" y="16" width="64" height="84" fill="#FF6B9D" opacity=".65"/>
            <!-- Hood inner -->
            <rect x="44" y="2"  width="32" height="12" fill="#2a0e2e"/>
            <!-- QT mark -->
            <text x="60" y="68" font-family="monospace" font-size="13" font-weight="900" fill="#fff" opacity=".25" text-anchor="middle">QT</text>
          </svg>
          <div class="merch-soon-badge">BIENTÔT</div>
        </div>
        <div class="merch-info">
          <div class="merch-name">HOODIE QT</div>
          <div class="merch-price">— €</div>
        </div>
      </div>

      <!-- Tee -->
      <div class="merch-card">
        <div class="merch-preview">
          <svg viewBox="0 0 120 100" width="110" class="merch-svg" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
            <!-- Collar -->
            <rect x="44" y="0"  width="32" height="8"  fill="#2a3a50"/>
            <!-- Shoulders -->
            <rect x="0"  y="0"  width="44" height="8"  fill="#4FC3F7" opacity=".7"/>
            <rect x="76" y="0"  width="44" height="8"  fill="#4FC3F7" opacity=".7"/>
            <!-- Sleeves -->
            <rect x="0"  y="8"  width="28" height="32" fill="#4FC3F7" opacity=".6"/>
            <rect x="92" y="8"  width="28" height="32" fill="#4FC3F7" opacity=".6"/>
            <!-- Body -->
            <rect x="28" y="8"  width="64" height="84" fill="#4FC3F7" opacity=".65"/>
            <!-- QT mark -->
            <text x="60" y="62" font-family="monospace" font-size="13" font-weight="900" fill="#fff" opacity=".25" text-anchor="middle">QT</text>
          </svg>
          <div class="merch-soon-badge">BIENTÔT</div>
        </div>
        <div class="merch-info">
          <div class="merch-name">TEE QT</div>
          <div class="merch-price">— €</div>
        </div>
      </div>

      <!-- Cap -->
      <div class="merch-card">
        <div class="merch-preview">
          <svg viewBox="0 0 120 100" width="110" class="merch-svg" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
            <!-- Brim -->
            <rect x="4"  y="60" width="88" height="10" fill="#5AA612" opacity=".7"/>
            <!-- Crown -->
            <rect x="20" y="20" width="72" height="40" fill="#5AA612" opacity=".65"/>
            <!-- Crown top -->
            <rect x="28" y="8"  width="56" height="12" fill="#5AA612" opacity=".6"/>
            <rect x="36" y="0"  width="40" height="8"  fill="#5AA612" opacity=".55"/>
            <!-- Band -->
            <rect x="20" y="56" width="72" height="6"  fill="#3D7A08" opacity=".8"/>
            <!-- QT mark -->
            <text x="56" y="48" font-family="monospace" font-size="12" font-weight="900" fill="#fff" opacity=".25" text-anchor="middle">QT</text>
          </svg>
          <div class="merch-soon-badge">BIENTÔT</div>
        </div>
        <div class="merch-info">
          <div class="merch-name">CAP QT</div>
          <div class="merch-price">— €</div>
        </div>
      </div>

    </div>
  </section>

  <!-- ── GDCC ───────────────────────────────────── -->
  <section class="gdcc-section">
    <div class="gdcc-noise"></div>
    <div class="gdcc-inner">
      <div class="gdcc-eyebrow">COLLAB À VENIR</div>
      <div class="gdcc-title">GDCC</div>
      <div class="gdcc-sub">Bientôt révélé.</div>
      <div class="gdcc-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </section>

  <div class="grad-rule"></div>

  <!-- ── FOOTER ─────────────────────────────────── -->
  <footer>
    <p>QUOICOUTOWN &nbsp;·&nbsp; Saison 3 <em>Forever</em> &nbsp;·&nbsp; 2025–2026</p>
  </footer>

  <script>
    const bg = document.getElementById('pixelBg');
    const colors = ['#5AA612','#4FC3F7','#FF6B9D','#7DD632','#1565C0'];
    for (let i = 0; i < 30; i++) {
      const el = document.createElement('div');
      el.className = 'px-particle';
      el.style.cssText = [
        `left:${Math.random()*100}%`,
        `width:${4+Math.random()*8}px`,
        `height:${4+Math.random()*8}px`,
        `background:${colors[Math.floor(Math.random()*colors.length)]}`,
        `animation-duration:${10+Math.random()*20}s`,
        `animation-delay:${-Math.random()*20}s`,
      ].join(';');
      bg.appendChild(el);
    }
  </script>

</body>
</html>
